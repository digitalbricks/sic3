<li class="uk-margin-left {{ @PATH ==  @BASE.'/' ? 'uk-active' : '' }}">
    <a href="{{ @BASE }}/" class="uk-flex uk-flex-middle">
        <span uk-icon="icon: home" class="uk-margin-small-right"></span>
        <span class="uk-visible@m">Dashboard</span>
    </a>
</li>

{* admin related menu items only for admins *}
<check if="{{ @userIsAdmin }}">
    <li class="uk-margin-left uk-visible@s {{ @PATH ==  @BASE.'/sites' ? 'uk-active' : '' }}">
        <a href="{{ @BASE }}/sites" class="uk-flex uk-flex-middle">
            <span uk-icon="icon: bookmark" class="uk-margin-small-right"></span>
            <span class="uk-visible@m">Sites</span>
        </a>
    </li>
    <li class="uk-margin-left uk-visible@s {{ @PATH ==  @BASE.'/users' ? 'uk-active' : '' }}">
        <a href="{{ @BASE }}/users" class="uk-flex uk-flex-middle">
            <span uk-icon="icon: users" class="uk-margin-small-right"></span>
            <span class="uk-visible@m">Users</span>
        </a>
    </li>
    <li class="uk-margin-left uk-visible@s {{ @PATH ==  @BASE.'/settings' ? 'uk-active' : '' }}">
        <a href="{{ @BASE }}/settings" class="uk-flex uk-flex-middle">
            <span uk-icon="icon: cog" class="uk-margin-small-right"></span>
            <span class="uk-visible@m">Settings</span>
        </a>
    </li>
</check>


{* addon panel toggle (panel located in _base.html), since 3.4.0 *}
<check if="{{ count(@addonMenuEntries) }}">
    <li class="uk-margin-left">
        <a href="#addonpanel" data-uk-toggle>
            <span uk-icon="icon: bolt" class="uk-margin-small-right"></span>
            <span class="uk-visible@m">Addons</span>
        </a>
    </li>
</check>
